name: Build-APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          workdir: .
      - uses: actions/upload-artifact@v2
         with:
          name: Nova-Uygulamasi
          path: bin/*.apk 
